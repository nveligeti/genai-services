# docker-compose.override.yml
# Local development overrides — auto-merged by docker compose

services:
  app:
    build:
      target: development     # use development stage
    volumes:
      # Live code reload — changes reflect immediately
      - ./app:/app/app
      - ./alembic:/app/alembic
      - uploads_data:/app/uploads
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
    command: >
      uvicorn app.main:create_app
      --factory
      --host 0.0.0.0
      --port 8000
      --reload

  # Expose postgres port for local DB tools
  postgres:
    ports:
      - "5432:5432"

  # Expose redis port for local inspection
  redis:
    ports:
      - "6379:6379"