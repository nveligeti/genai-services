# docker-compose.yml — replace entire file

name: documind

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: documind-app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: DocuMind
      APP_VERSION: "0.1.0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-documind}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-documind}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mock-gpt}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      EMBEDDING_MODEL: mock
    volumes:
      - uploads_data:/app/uploads
    networks:
      - documind-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: documind-migrate
    command: python -m alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-documind}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-documind}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
    networks:
      - documind-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:15-alpine
    container_name: documind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-documind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-documind}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - documind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-documind} -d ${POSTGRES_DB:-documind}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # docker-compose.yml — replace qdrant healthcheck only

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: documind-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - documind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: documind-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - documind-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    name: documind_postgres_data
  qdrant_data:
    name: documind_qdrant_data
  redis_data:
    name: documind_redis_data
  uploads_data:
    name: documind_uploads_data

networks:
  documind-net:
    name: documind-net
    driver: bridge